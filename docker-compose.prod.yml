version: '3.8'

services:
  backend:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://trading_user:trading_password@db:5432/trading_db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - trading-network

  db:
    image: postgres:13-alpine
    restart: always
    environment:
      - POSTGRES_USER=trading_user
      - POSTGRES_PASSWORD=trading_password
      - POSTGRES_DB=trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network

  redis:
    image: redis:6-alpine
    restart: always
    networks:
      - trading-network

volumes:
  postgres_data:

networks:
  trading-network:
    driver: bridge
