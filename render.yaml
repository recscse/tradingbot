services:
  # Backend Service
  - type: web
    name: trading-bot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trading-cache
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
    autoDeploy: false  # We trigger via CI/CD

  # Database
  - type: psql
    name: trading-db
    plan: starter
    ipAllowList: [] # Allow all for now, restrict in production console

  # Redis Cache
  - type: redis
    name: trading-cache
    plan: starter
    ipAllowList: [] 

