[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=services
    --cov=router
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=10
    --asyncio-mode=auto
    --durations=10
    --maxfail=5

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    performance: Performance and load tests
    api: API endpoint tests
    e2e: End-to-end workflow tests
    slow: Slow running tests (>5 seconds)
    fast: Fast tests (<1 second)
    breakout: Breakout engine related tests
    websocket: WebSocket functionality tests
    database: Database operations tests
    broker: Broker integration tests
    auth: Authentication tests
    ui: User interface tests

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:numba.*

# Minimum version requirements
minversion = 6.0

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = services, router
omit = 
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*
    */alembic/versions/*
    setup.py
    */conftest.py

[coverage:report]
# Regexes for lines to exclude from consideration
exclude_lines =
    # Have to re-enable the standard pragma
    pragma: no cover

    # Don't complain about missing debug-only code:
    def __repr__
    if self\.debug

    # Don't complain if tests don't hit defensive assertion code:
    raise AssertionError
    raise NotImplementedError

    # Don't complain if non-runnable code isn't run:
    if 0:
    if __name__ .__main__.:

    # Don't complain about abstract methods
    @(abc\.)?abstractmethod

ignore_errors = True
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov