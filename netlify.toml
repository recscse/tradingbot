[build]
  base = "ui/trading-bot-ui"
  publish = "build"
  # Automate: Build React App THEN build MkDocs into the /docs folder
  command = "CI=false DISABLE_ESLINT_PLUGIN=true ESLINT_NO_DEV_ERRORS=true npm ci && npm run build && pip install mkdocs-material && mkdocs build -f ../../mkdocs.yml -d build/docs"

[[redirects]]
  # Documentation path (Ensure it doesn't get caught by the SPA redirect)
  from = "/docs/*"
  to = "/docs/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 🔒 Global Security Headers (Applied to ALL paths)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HSTS: Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Permissions: Disable sensitive features not needed
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    # CSP: Allow Google Sign-In and your API
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com/gsi/client; frame-src https://accounts.google.com/; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss: https://accounts.google.com/gsi/;"

# ⚡ Caching for Static Assets (Images, JS, CSS) - Cache for 1 year
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 🚫 No Caching for HTML (Ensure users always get the latest app version)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# 🚫 No Caching for Service Worker
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"