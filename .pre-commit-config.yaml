# Pre-commit hooks for code quality and testing
repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--line-length=88]
        exclude: ^(ui/|venv/|alembic/versions/)
        
  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]
        exclude: ^(ui/|venv/|alembic/versions/)
        
  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]
        exclude: ^(ui/|venv/|alembic/versions/)
        
  # Security scanning
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-r, --exclude=tests,ui,venv]
        
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(ui/|\.md$)
      - id: end-of-file-fixer
        exclude: ^(ui/|\.md$)
      - id: check-yaml
      - id: check-json
        exclude: ^(ui/)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
        
  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
        
  # Custom testing hook
  - repo: local
    hooks:
      - id: pytest-unit-tests
        name: Run unit tests
        entry: python
        args: [run_tests.py, unit, --fast]
        language: system
        files: ^(services/|router/|tests/unit/).*\.py$
        pass_filenames: false
        stages: [commit]
        
      - id: enhanced-breakout-test
        name: Test Enhanced Breakout Engine
        entry: python
        args: [-c, "try: from services.enhanced_breakout_engine import enhanced_breakout_engine; metrics = enhanced_breakout_engine.get_metrics(); print('Enhanced Breakout Engine validation passed'); except Exception as e: print(f'Enhanced Breakout Engine test: {e}')"]
        language: system
        files: ^services/enhanced_breakout_engine\.py$
        pass_filenames: false
        stages: [commit]
        
      - id: no-debug-imports
        name: Check for debug imports
        entry: python
        args: [-c, "import sys, re; content = sys.stdin.read(); debug_patterns = [r'import pdb', r'import ipdb', r'breakpoint\\(', r'print\\s*\\(.*DEBUG']; matches = [p for p in debug_patterns if re.search(p, content, re.IGNORECASE)]; sys.exit(1 if matches else 0)"]
        language: system
        files: ^(services/|router/).*\.py$
        stages: [commit]

# Configuration
default_stages: [commit]
fail_fast: false
minimum_pre_commit_version: "3.0.0"