name: Claude Code Review Workflow - Comprehensive Standards Enforcement

on:
  pull_request:
    branches: [ main, develop, feature/*, hotfix/* ]
  push:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  MIN_COVERAGE: 80

jobs:
  # Phase 1: Standards Compliance Check
  phase1-standards-compliance:
    name: "Phase 1: Standards Compliance"
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort mypy flake8 bandit safety pylint
        
    - name: Naming Convention Check
      run: |
        echo "🏷️ Checking naming conventions..."
        python scripts/check_naming_conventions.py
        
    - name: Code Formatting Check (Black)
      run: |
        echo "🎨 Checking code formatting..."
        black --check --diff . || (echo "❌ Code formatting failed. Run 'black .' to fix." && exit 1)
        
    - name: Import Sorting Check (isort)
      run: |
        echo "📦 Checking import sorting..."
        isort --check-only --diff . || (echo "❌ Import sorting failed. Run 'isort .' to fix." && exit 1)
        
    - name: Type Hints Validation (mypy)
      run: |
        echo "🔍 Validating type hints..."
        mypy . --ignore-missing-imports --strict-optional --warn-return-any
        
    - name: Documentation Standards Check
      run: |
        echo "📚 Checking documentation standards..."
        python scripts/check_docstring_quality.py
        
    - name: SOLID Principles Validation
      run: |
        echo "🏗️ Validating SOLID principles..."
        python scripts/check_solid_principles.py

  # Phase 2: Code Quality Review
  phase2-code-quality:
    name: "Phase 2: Code Quality Review"
    runs-on: ubuntu-latest
    needs: phase1-standards-compliance
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint radon complexity-report
        
    - name: Code Quality Analysis (Pylint)
      run: |
        echo "🔍 Running comprehensive code quality analysis..."
        pylint **/*.py --output-format=text --reports=yes --score=yes
        
    - name: Cyclomatic Complexity Check
      run: |
        echo "🔄 Checking code complexity..."
        radon cc . --min=C --show-complexity
        
    - name: Clean Code Principles Validation
      run: |
        echo "🧹 Validating clean code principles..."
        python scripts/check_clean_code_principles.py
        
    - name: Performance Analysis
      run: |
        echo "⚡ Analyzing performance patterns..."
        python scripts/check_performance_patterns.py
        
  # Phase 3: Financial/Trading-Specific Validation
  phase3-financial-validation:
    name: "Phase 3: Financial/Trading Validation"
    runs-on: ubuntu-latest
    needs: phase2-code-quality
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Decimal Precision Validation
      run: |
        echo "💰 Validating Decimal usage for financial calculations..."
        python scripts/check_decimal_usage.py
        
    - name: Financial Calculations Audit
      run: |
        echo "📊 Auditing financial calculations..."
        python scripts/validate_financial_calculations.py
        
    - name: Trading-Specific Compliance
      run: |
        echo "📈 Checking trading-specific compliance..."
        python scripts/check_trading_compliance.py
        
    - name: Risk Management Validation
      run: |
        echo "⚠️ Validating risk management patterns..."
        python scripts/check_risk_management.py
        
    - name: Audit Trail Compliance
      run: |
        echo "📝 Checking audit trail compliance..."
        python scripts/check_audit_trails.py
        
    - name: Regulatory Compliance Check
      run: |
        echo "🏛️ Validating regulatory compliance (SEBI, RBI)..."
        python scripts/check_regulatory_compliance.py

  # Phase 4: Security & Vulnerability Assessment  
  phase4-security-assessment:
    name: "Phase 4: Security Assessment"
    runs-on: ubuntu-latest
    needs: phase3-financial-validation
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety semgrep
        
    - name: Security Vulnerability Scan (Bandit)
      run: |
        echo "🔒 Running security vulnerability scan..."
        bandit -r . -f json -o bandit-report.json -ll
        
    - name: Dependency Security Check (Safety)
      run: |
        echo "📦 Checking dependency vulnerabilities..."
        safety check --json --output safety-report.json
        
    - name: Static Application Security Testing (SAST)
      run: |
        echo "🛡️ Running static security analysis..."
        semgrep --config=auto . --json --output=semgrep-report.json
        
    - name: Secrets Detection
      run: |
        echo "🔑 Scanning for hardcoded secrets..."
        python scripts/check_secrets.py
        
    - name: SQL Injection Prevention Check
      run: |
        echo "💉 Checking SQL injection prevention..."
        python scripts/check_sql_injection_prevention.py

  # Phase 5: Frontend/React Standards  
  phase5-frontend-standards:
    name: "Phase 5: Frontend Standards"
    runs-on: ubuntu-latest
    needs: phase4-security-assessment
    defaults:
      run:
        working-directory: ./ui/trading-bot-ui
        
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ui/trading-bot-ui/package-lock.json
        
    - name: Cache Node Modules
      uses: actions/cache@v3
      with:
        path: ui/trading-bot-ui/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        
    - name: Install Dependencies
      run: npm ci
      
    - name: React Standards Validation
      run: |
        echo "⚛️ Validating React standards..."
        npm run lint:react-standards
        
    - name: ESLint Comprehensive Check
      run: |
        echo "🔍 Running comprehensive ESLint check..."
        npm run lint -- --max-warnings 0
        
    - name: TypeScript Type Check
      run: |
        echo "📘 Running TypeScript type checking..."
        npm run type-check
        
    - name: Accessibility Testing (a11y)
      run: |
        echo "♿ Running accessibility tests..."
        npm run test:a11y
        
    - name: Performance Bundle Analysis
      run: |
        echo "📦 Analyzing bundle performance..."
        npm run analyze -- --analyzer-mode=json --report-filename=bundle-report.json
        
    - name: Component Testing
      run: |
        echo "🧪 Running component tests..."
        npm run test -- --coverage --watchAll=false --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

  # Phase 6: Comprehensive Testing & Coverage
  phase6-testing-coverage:
    name: "Phase 6: Testing & Coverage"
    runs-on: ubuntu-latest
    needs: phase5-frontend-standards
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock
        
    - name: Unit Tests with Coverage
      run: |
        echo "🧪 Running unit tests with coverage..."
        pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=${{ env.MIN_COVERAGE }}
        
    - name: Integration Tests
      run: |
        echo "🔗 Running integration tests..."
        pytest tests/integration/ --verbose
        
    - name: Performance Tests
      run: |
        echo "⚡ Running performance tests..."
        pytest tests/performance/ --verbose
        
    - name: Database Tests
      run: |
        echo "🗃️ Running database tests..."
        pytest tests/database/ --verbose
        
    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: backend
        name: backend-coverage
        
  # Phase 7: Final Production Readiness Check
  phase7-production-readiness:
    name: "Phase 7: Production Readiness"
    runs-on: ubuntu-latest
    needs: phase6-testing-coverage
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Environment Configuration Validation
      run: |
        echo "⚙️ Validating environment configuration..."
        python scripts/validate_env_config.py
        
    - name: Database Migration Check
      run: |
        echo "🗃️ Checking database migrations..."
        python scripts/check_migrations.py
        
    - name: API Documentation Validation
      run: |
        echo "📚 Validating API documentation..."
        python scripts/validate_api_docs.py
        
    - name: Monitoring & Logging Check
      run: |
        echo "📊 Checking monitoring and logging setup..."
        python scripts/check_monitoring.py
        
    - name: Business Continuity Validation
      run: |
        echo "🏢 Validating business continuity measures..."
        python scripts/check_business_continuity.py
        
    - name: Final Standards Compliance Report
      run: |
        echo "📋 Generating final compliance report..."
        python scripts/generate_compliance_report.py
        
  # Summary Job
  claude-review-complete:
    name: "Claude Review Complete ✅"
    runs-on: ubuntu-latest
    needs: [
      phase1-standards-compliance,
      phase2-code-quality, 
      phase3-financial-validation,
      phase4-security-assessment,
      phase5-frontend-standards,
      phase6-testing-coverage,
      phase7-production-readiness
    ]
    
    steps:
    - name: Review Summary
      run: |
        echo "🎉 Claude Code Review Workflow Complete!"
        echo "✅ Phase 1: Standards Compliance - PASSED"
        echo "✅ Phase 2: Code Quality Review - PASSED" 
        echo "✅ Phase 3: Financial Validation - PASSED"
        echo "✅ Phase 4: Security Assessment - PASSED"
        echo "✅ Phase 5: Frontend Standards - PASSED"
        echo "✅ Phase 6: Testing & Coverage - PASSED"
        echo "✅ Phase 7: Production Readiness - PASSED"
        echo ""
        echo "🚀 Code is ready for production deployment!"
        echo "📊 All enterprise-grade standards enforced"
        echo "🏆 Wall Street-level quality achieved"