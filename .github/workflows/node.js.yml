name: Frontend CI/CD Clean

on:
  push:
    branches: [ "main", "feature-branch" ]
    paths: 
      - 'ui/trading-bot-ui/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ui/trading-bot-ui/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/trading-bot-ui

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: ui/trading-bot-ui/package-lock.json
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Run security audit
      run: npm audit --audit-level high || echo "Vulnerabilities found"
        
    - name: Build application
      run: npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        GENERATE_SOURCEMAP: false
        
    - name: Validate build
      run: |
        if [ ! -f "build/index.html" ]; then
          echo "Build failed"
          exit 1
        fi
        echo "Build successful"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ui/trading-bot-ui
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: ui/trading-bot-ui/package-lock.json
        
    - name: Install and build
      run: |
        npm ci || npm install
        npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        REACT_APP_WS_URL: ${{ secrets.REACT_APP_WS_URL }}
        GENERATE_SOURCEMAP: false
        
    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      with:
        args: deploy --prod --dir=ui/trading-bot-ui/build
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}