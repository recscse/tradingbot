# CI/CD Pipeline for Trading Bot Backend (Python FastAPI)
name: Backend CI/CD

on:
  push:
    branches: [ "main", "feature-branch" ]
    paths: 
      - '**/*.py'
      - 'requirements.txt'
      - 'alembic/**'
      - '.github/workflows/python-app.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'alembic/**'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_trading_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_trading_db
      JWT_SECRET_KEY: test-secret-key-for-ci
      REDIS_ENABLED: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov pytest-asyncio black isort
        pip install -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        
    - name: Code formatting check (Black)
      run: |
        black --check --diff .
        
    - name: Import sorting check (isort)
      run: |
        isort --check-only --diff .
        
    - name: Lint with flake8
      run: |
        # Stop build on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=ui/,venv/,alembic/versions/
        
    - name: Run database migrations
      run: |
        alembic upgrade head
        
    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=html --cov-fail-under=70
        
    - name: Health check endpoints test
      run: |
        python -c "
        import asyncio
        from fastapi.testclient import TestClient
        from app import sio_app
        
        client = TestClient(sio_app)
        response = client.get('/health')
        assert response.status_code == 200
        print('✅ Health check endpoint working')
        "
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install security scanning tools
      run: |
        pip install safety bandit semgrep
        
    - name: Run Safety check for vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
        
    - name: Run Bandit security scan
      run: |
        bandit -r . -f json -o bandit-report.json --exclude ./ui/,./venv/ || true
        
    - name: Run Semgrep security scan
      run: |
        semgrep --config=auto --json --output=semgrep-report.json . || true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/feature-branch'
    
    steps:
    - name: Deploy to Staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "Branch: ${{ github.ref }}"
        # Add your staging deployment commands here
        
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to Production
      run: |
        echo "🚀 Deploying to production environment..."
        echo "This would trigger Render deployment..."
        # Add production deployment webhook/API calls here
