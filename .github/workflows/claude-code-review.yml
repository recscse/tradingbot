# Claude-Powered Code Review Workflow
name: Claude Code Review

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Get PR changes
      id: pr-changes
      run: |
        # Get the diff of changed files
        git diff origin/main...HEAD > pr_changes.diff
        
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
        echo "changed_files<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Count changes
        TOTAL_CHANGES=$(git diff --shortstat origin/main...HEAD)
        echo "total_changes=$TOTAL_CHANGES" >> $GITHUB_OUTPUT
        
        echo "📊 Changes summary:"
        echo "$TOTAL_CHANGES"
        
    - name: Analyze changed files
      id: analysis
      run: |
        CHANGED_FILES="${{ steps.pr-changes.outputs.changed_files }}"
        
        # Categorize changes
        PYTHON_FILES=""
        JS_FILES=""
        CONFIG_FILES=""
        TRADING_FILES=""
        
        while IFS= read -r file; do
          if [ -n "$file" ]; then
            case "$file" in
              *.py)
                PYTHON_FILES="$PYTHON_FILES$file\n"
                if [[ "$file" =~ (trading|broker|strategy|order) ]]; then
                  TRADING_FILES="$TRADING_FILES$file\n"
                fi
                ;;
              *.js|*.jsx|*.ts|*.tsx)
                if [[ "$file" =~ ui/ ]]; then
                  JS_FILES="$JS_FILES$file\n"
                fi
                ;;
              *.yml|*.yaml|*.json|*.toml|*.ini|requirements.txt)
                CONFIG_FILES="$CONFIG_FILES$file\n"
                ;;
            esac
          fi
        done <<< "$CHANGED_FILES"
        
        echo "python_files<<EOF" >> $GITHUB_OUTPUT
        echo -e "$PYTHON_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "js_files<<EOF" >> $GITHUB_OUTPUT
        echo -e "$JS_FILES" >> $GITHUB_OUTPUT  
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "trading_files<<EOF" >> $GITHUB_OUTPUT
        echo -e "$TRADING_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Generate Claude review prompt
      id: claude-prompt
      run: |
        cat << 'EOF' > claude_review_prompt.md
# Code Review Request for Trading Bot Application

## Context
This is a pull request for a full-stack algorithmic trading bot with Python FastAPI backend and React frontend. The system integrates with multiple Indian brokers (Angel One, Dhan, Upstox, Zerodha, Fyers) and handles real-time trading operations.

## PR Information
**Title:** ${{ github.event.pull_request.title }}
**Author:** ${{ github.event.pull_request.user.login }}
**Description:** 
${{ github.event.pull_request.body }}

## Changes Summary
${{ steps.pr-changes.outputs.total_changes }}

## Files Modified
### Python Backend Files:
${{ steps.analysis.outputs.python_files }}

### Frontend Files (React):
${{ steps.analysis.outputs.js_files }}

### Trading-Related Files (HIGH PRIORITY):
${{ steps.analysis.outputs.trading_files }}

## Review Focus Areas
Please provide a comprehensive code review focusing on:

### 🛡️ Trading Safety & Risk Management
- Position sizing and risk controls
- Stop-loss implementation
- Order validation logic
- Error handling for trading operations
- Market hours and trading session validation

### 🔒 Security Review
- API key and credential handling
- Input validation and sanitization
- Authentication and authorization
- SQL injection prevention
- XSS protection (frontend)

### 🏗️ Code Quality & Architecture
- Code organization and modularity
- Error handling and logging
- Performance optimizations
- Memory usage (important for 500MB Render limit)
- Async/await usage in Python
- React best practices and hooks usage

### 🔄 Integration & Data Flow
- WebSocket connection management
- Database migration safety
- Broker API integration correctness
- Real-time data handling
- Caching strategy effectiveness

### 📊 Specific Trading Bot Concerns
- Market data accuracy and timing
- Order execution logic
- Portfolio tracking correctness  
- Backtesting validity
- AI/ML model integration safety

## Diff Content
```diff
EOF
        
        # Append the actual diff (limited to avoid token limits)
        head -500 pr_changes.diff >> claude_review_prompt.md
        echo '```' >> claude_review_prompt.md
        
        echo ""
        echo "Please provide:"
        echo "1. Overall assessment and approval/rejection recommendation"
        echo "2. Specific line-by-line feedback for critical issues"
        echo "3. Security and trading safety concerns"
        echo "4. Performance and scalability considerations"  
        echo "5. Suggestions for improvements"
        echo ""
        echo "Format your response as a GitHub comment with clear sections and actionable feedback."
        
        # Save prompt for potential API call
        echo "prompt_file=claude_review_prompt.md" >> $GITHUB_OUTPUT
        
    - name: Create Claude review comment
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          // Since we can't directly call Claude API from GitHub Actions,
          // we'll create a structured comment with analysis and instructions
          
          const promptContent = fs.readFileSync('claude_review_prompt.md', 'utf8');
          
          const reviewComment = `## 🤖 Claude Code Review Analysis
          
**Automated Analysis Complete** ✅

### 📋 Review Checklist Generated

This PR has been analyzed and the following areas require attention:

#### 🛡️ Trading Safety Review
- [ ] Position sizing logic validated
- [ ] Stop-loss mechanisms implemented
- [ ] Order validation checks present
- [ ] Risk management rules enforced
- [ ] Market session validation active

#### 🔒 Security Checklist
- [ ] No hardcoded credentials in code
- [ ] Input validation implemented
- [ ] SQL injection protection verified
- [ ] Authentication flows secure
- [ ] API rate limiting considered

#### 🏗️ Code Quality Standards
- [ ] Error handling comprehensive
- [ ] Logging appropriately implemented
- [ ] Memory usage optimized for deployment
- [ ] Async operations properly handled
- [ ] Code follows project conventions

#### 🔄 Integration Validation  
- [ ] WebSocket connections managed properly
- [ ] Database migrations are safe
- [ ] Broker API calls error-resistant
- [ ] Real-time data flow optimized
- [ ] Caching strategy appropriate

### 📊 Change Impact Analysis

**Files Modified:** ${${{ steps.pr-changes.outputs.changed_files }}.split('\n').length} files
**Trading-Critical Files:** ${(${{ steps.analysis.outputs.trading_files }} || '').split('\n').filter(f => f.trim()).length} files

${${{ steps.analysis.outputs.trading_files }} ? 
\`\`\`
⚠️ CRITICAL: Trading system files modified
Manual review by senior trading developer required
\`\`\`
: '✅ No critical trading files modified'}

### 🎯 Manual Review Required

**For Reviewers:**
1. **Trading Safety**: Verify all trading logic changes with paper trading first
2. **Security**: Check for credential exposure or security vulnerabilities  
3. **Performance**: Ensure changes fit within 500MB Render deployment limit
4. **Integration**: Test WebSocket and broker API integrations thoroughly

**For Claude Code Review (Manual):**
If you need AI-powered code review, you can:
1. Copy the diff from this PR
2. Use Claude Code CLI: \`claude code review\`
3. Or visit [Claude Code](https://claude.ai/code) and paste the changes

---
*This automated analysis helps identify review priorities. Human review is still required for approval.*
`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: reviewComment
          });

  trading-specific-review:
    runs-on: ubuntu-latest
    needs: claude-review
    if: contains(github.event.pull_request.body, 'trading') || contains(github.event.pull_request.title, 'trading') || contains(github.event.pull_request.title, 'broker') || contains(github.event.pull_request.title, 'strategy')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Trading safety analysis
      run: |
        echo "🚨 TRADING SYSTEM CHANGES DETECTED"
        echo "============================================"
        
        # Check for trading-related patterns in the diff
        git diff origin/main...HEAD > full_diff.txt
        
        echo "🔍 Analyzing trading-related changes..."
        
        # Check for position sizing
        POSITION_SIZING=$(grep -i -n "position.*size\|quantity\|lot.*size" full_diff.txt || true)
        if [ ! -z "$POSITION_SIZING" ]; then
          echo "📊 Position sizing changes detected:"
          echo "$POSITION_SIZING"
        fi
        
        # Check for stop loss
        STOP_LOSS=$(grep -i -n "stop.*loss\|sl\|stop_loss" full_diff.txt || true)  
        if [ ! -z "$STOP_LOSS" ]; then
          echo "🛡️ Stop-loss changes detected:"
          echo "$STOP_LOSS"
        fi
        
        # Check for order placement
        ORDER_LOGIC=$(grep -i -n "place.*order\|buy\|sell\|order_type" full_diff.txt || true)
        if [ ! -z "$ORDER_LOGIC" ]; then
          echo "📈 Order placement logic changes:"
          echo "$ORDER_LOGIC"
        fi
        
        # Check for API calls to brokers
        BROKER_API=$(grep -i -n "api.*call\|requests\.\|upstox\|angel\|dhan\|zerodha" full_diff.txt || true)
        if [ ! -z "$BROKER_API" ]; then
          echo "🔌 Broker API changes detected:"
          echo "$BROKER_API"
        fi
        
    - name: Create trading safety comment
      uses: actions/github-script@v6
      with:
        script: |
          const comment = `## 🚨 TRADING SAFETY REVIEW REQUIRED

**⚠️ This PR modifies trading system components**

### 🛡️ MANDATORY SAFETY CHECKS

Before this PR can be merged, ensure:

1. **📋 Testing Protocol**
   - [ ] All changes tested with paper trading first
   - [ ] Integration tests pass with test broker accounts
   - [ ] Real-time WebSocket data flows correctly
   - [ ] Database migrations tested in staging

2. **💰 Risk Management**
   - [ ] Position sizing limits enforced
   - [ ] Maximum loss per trade configured
   - [ ] Stop-loss mechanisms working
   - [ ] Daily loss limits implemented

3. **🔌 Broker Integration**
   - [ ] API rate limits respected
   - [ ] Token refresh working (especially Upstox automation)
   - [ ] Error handling for network failures
   - [ ] Market hours validation active

4. **📊 Data Integrity**
   - [ ] Price data accuracy verified
   - [ ] Order status tracking correct
   - [ ] Portfolio calculations accurate
   - [ ] Real-time updates synchronized

### ⚡ DEPLOYMENT CHECKLIST

- [ ] Playwright automation works in Render environment
- [ ] Memory usage within 500MB limit
- [ ] Environment variables configured
- [ ] Health check endpoints responding

### 👥 Required Approvals

- [ ] Senior trading developer review
- [ ] Risk management approval
- [ ] Technical lead sign-off

**🚫 DO NOT MERGE without completing all safety checks above**

*Trading systems handle real money - safety is paramount*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });