# Pull Request Review and Code Quality Workflow
name: PR Review & Quality

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.py"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tsx"
      - "ui/trading-bot-ui/**"
      - ".github/workflows/pr-review.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  quality-and-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: PR Validation (Title & Description)
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        echo "PR Title: $PR_TITLE"
        
        # Validate Title
        if [[ $PR_TITLE =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|hotfix|enhance)(\(.+\))?:.*$ ]]; then
          echo "✅ PR title follows conventional commit format"
        else
          echo "⚠️ PR title should follow conventional commit format (e.g., feat: add new strategy)"
        fi
        
        # Validate Body
        if [ ${#PR_BODY} -lt 20 ]; then
          echo "⚠️ PR description is too short"
        fi

    - name: Code Complexity Analysis
      run: |
        pip install radon
        # Get count of changed python files
        PYTHON_FILES=$(git diff --name-only origin/main...HEAD | grep -E "\.py$" | wc -l || echo "0")
        
        if [ "$PYTHON_FILES" -gt 0 ]; then
          echo "📈 Code complexity analysis:"
          radon cc . -s -a --exclude="*/venv/*,*/ui/*,*/node_modules/*"
        else
          echo "No Python files changed, skipping complexity analysis"
        fi

    - name: Trading Safety Check
      run: |
        echo "🛡️ Checking trading safety measures..."
        TRADING_FILES=$(git diff --name-only origin/main...HEAD | grep -E "(trading|order|broker|strategy)" || true)
        
        if [ ! -z "$TRADING_FILES" ]; then
          echo "📊 Trading-related files modified, verifying risk patterns..."
          git diff origin/main...HEAD | grep -i -E "(stop.loss|risk|position.size|max.loss)" || echo "⚠️ No risk management patterns detected in trading code!"
        fi

    - name: Automated Feedback
      uses: actions/github-script@v6
      if: github.event.action == 'opened'
      with:
        script: |
          const comment = `## 🤖 Automated PR Quality Check\n` +
            `Validated PR structure, code complexity, and trading safety patterns. Reviewers have been notified.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  ai-code-review:
    runs-on: ubuntu-latest
    needs: quality-and-safety
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install google-generativeai PyGithub
        
    - name: Run AI Reviewer
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python scripts/ai_pr_reviewer.py \
          --repo "${{ github.repository }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --github-token "$GITHUB_TOKEN" \
          --gemini-api-key "$GEMINI_API_KEY"

  trading-risk-guard:
    runs-on: ubuntu-latest
    needs: quality-and-safety
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Run Trading Risk Guard
      run: |
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ' ')
        if [ ! -z "$CHANGED_FILES" ]; then
          python scripts/trading_risk_guard.py $CHANGED_FILES
        else
          echo "No files changed, skipping scan."
        fi

  automated-backtest:
    runs-on: ubuntu-latest
    needs: quality-and-safety
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install google-generativeai PyGithub pandas upstox-python-sdk httpx sqlalchemy psycopg2-binary
        
    - name: Run Automated Backtest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      run: |
        # Run the backtest script for changed strategies
        python scripts/automated_backtest.py \
          --repo "${{ github.repository }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --github-token "$GITHUB_TOKEN" \
          --upstox-token "$UPSTOX_ACCESS_TOKEN"

  docs-and-changelog:
    runs-on: ubuntu-latest
    needs: quality-and-safety
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install google-generativeai PyGithub
        
    - name: Run AI Docs Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python scripts/ai_docs_agent.py \
          --repo "${{ github.repository }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --github-token "$GITHUB_TOKEN" \
          --gemini-api-key "$GEMINI_API_KEY"