# Comprehensive Security Scanning Workflow
name: Security Comprehensive

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - "**/*.py"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tsx"
      - "requirements.txt"
      - "package.json"
      - ".github/workflows/security-comprehensive.yml"
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - secrets
        - dependencies
        - code-analysis
        - docker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
        head: HEAD
        extra_args: --debug --only-verified
        
    - name: Custom secret patterns scan
      run: |
        echo "🔍 Scanning for custom secret patterns..."
        
        # Define patterns for trading-specific secrets
        SECRET_PATTERNS=(
          "api.key.*['\"][0-9a-zA-Z]{20,}['\"]"
          "secret.*['\"][0-9a-zA-Z]{32,}['\"]"
          "token.*['\"][0-9a-zA-Z]{20,}['\"]"
          "password.*['\"][^'\"]{8,}['\"]"
          "upstox.*key.*['\"][0-9a-zA-Z]+['\"]"
          "angel.*one.*['\"][0-9a-zA-Z]+['\"]"
          "dhan.*api.*['\"][0-9a-zA-Z]+['\"]"
        )
        
        FOUND_SECRETS=0
        
        for pattern in "${SECRET_PATTERNS[@]}"; do
          echo "Checking pattern: $pattern"
          
          if grep -r -i -n -E "$pattern" --include="*.py" --include="*.js" --include="*.json" --exclude-dir=node_modules --exclude-dir=venv --exclude-dir=tests . ; then
            echo "⚠️ Potential secret found matching pattern: $pattern"
            FOUND_SECRETS=$((FOUND_SECRETS + 1))
          fi
        done
        
        if [ $FOUND_SECRETS -gt 0 ]; then
          echo "❌ Found $FOUND_SECRETS potential secrets"
          exit 1
        else
          echo "✅ No secrets found"
        fi

  dependency-scanning:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ecosystem: [python, npm]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Python dependency scan
      if: matrix.ecosystem == 'python'
      run: |
        echo "🔍 Scanning Python dependencies..."
        
        # Install safety
        pip install safety
        
        # Check for known vulnerabilities
        if [ -f requirements.txt ]; then
          safety check -r requirements.txt --json --output safety-report.json || true
          
          if [ -f safety-report.json ]; then
            # Check if vulnerabilities were found
            VULN_COUNT=$(cat safety-report.json | jq '.vulnerabilities | length' 2>/dev/null || echo "0")
            
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "⚠️ Found $VULN_COUNT vulnerabilities in Python dependencies"
              cat safety-report.json | jq '.vulnerabilities[] | {package: .package_name, vulnerability: .vulnerability_id, severity: .severity}' || true
            else
              echo "✅ No Python dependency vulnerabilities found"
            fi
          fi
        fi
        
        # Check for outdated packages
        pip install pip-audit
        pip-audit --desc || echo "Pip-audit completed with issues"
        
    - name: NPM dependency scan
      if: matrix.ecosystem == 'npm'
      working-directory: ui/trading-bot-ui
      run: |
        echo "🔍 Scanning NPM dependencies..."
        
        if [ -f package.json ]; then
          # Run npm audit
          npm audit --audit-level moderate --json > npm-audit-report.json 2>&1 || true
          
          if [ -f npm-audit-report.json ]; then
            VULN_COUNT=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.total // 0' 2>/dev/null || echo "0")
            
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "⚠️ Found $VULN_COUNT vulnerabilities in NPM dependencies"
              cat npm-audit-report.json | jq '.advisories' 2>/dev/null || true
            else
              echo "✅ No NPM dependency vulnerabilities found"
            fi
          fi
          
          # Check for outdated packages
          npm outdated || echo "Some packages are outdated"
        fi
        
    - name: Upload vulnerability reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vulnerability-reports-${{ matrix.ecosystem }}
        path: |
          safety-report.json
          npm-audit-report.json
          ui/trading-bot-ui/npm-audit-report.json
        retention-days: 30

  code-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install analysis tools
      run: |
        pip install bandit semgrep mypy pylint
        
    - name: Run Bandit security scan
      run: |
        echo "🔍 Running Bandit security analysis..."
        
        bandit -r . \
          -f json \
          -o bandit-report.json \
          --exclude ./ui/,./venv/,./tests/ \
          --skip B101,B601 \
          || echo "Bandit scan completed with issues"
          
        if [ -f bandit-report.json ]; then
          # Check for high severity issues
          HIGH_SEVERITY=$(cat bandit-report.json | jq '.results[] | select(.issue_severity == "HIGH") | .test_name' 2>/dev/null | wc -l || echo "0")
          
          if [ "$HIGH_SEVERITY" -gt 0 ]; then
            echo "⚠️ Found $HIGH_SEVERITY high severity security issues"
            cat bandit-report.json | jq '.results[] | select(.issue_severity == "HIGH") | {test: .test_name, file: .filename, line: .line_number, issue: .issue_text}' || true
          else
            echo "✅ No high severity security issues found"
          fi
        fi
        
    - name: Run Semgrep scan
      run: |
        echo "🔍 Running Semgrep analysis..."
        
        # Use specific rulesets for trading applications
        semgrep \
          --config=auto \
          --config=security \
          --config=python \
          --json \
          --output=semgrep-report.json \
          . || echo "Semgrep scan completed"
          
        if [ -f semgrep-report.json ]; then
          FINDINGS=$(cat semgrep-report.json | jq '.results | length' 2>/dev/null || echo "0")
          
          if [ "$FINDINGS" -gt 0 ]; then
            echo "⚠️ Found $FINDINGS security findings"
            cat semgrep-report.json | jq '.results[] | {rule: .check_id, file: .path, severity: .extra.severity}' | head -20 || true
          else
            echo "✅ No security findings from Semgrep"
          fi
        fi
        
    - name: Trading-specific security checks
      run: |
        echo "🔍 Running trading-specific security checks..."
        
        # Check for significant hardcoded trading parameters (excluding common defaults like 0, 1, 0.0)
        echo "Checking for significant hardcoded trading parameters..."
        # Pattern looks for quantity/price assignments that are NOT 0, 1, or 0.0
        # Excludes tests and common services where defaults are defined
        if grep -r -n -E "(quantity.*=.*[2-9][0-9]*|price.*=.*[1-9][0-9]+\.[0-9]+|stop_loss.*=.*[1-9][0-9]*)" \
           --include="*.py" \
           --exclude-dir=tests \
           --exclude-dir=venv \
           services/ router/ 2>/dev/null; then
          echo "⚠️ Found potentially significant hardcoded trading parameters - consider making them configurable"
        fi || true
        
        # Check for unsafe eval usage
        echo "Checking for unsafe eval usage..."
        # Using \b to match whole word 'eval' and filtering out 'ast.literal_eval'
        if grep -r -n "\beval(" --include="*.py" --exclude-dir=tests --exclude-dir=venv . 2>/dev/null | grep -v "ast.literal_eval"; then
          echo "❌ Found eval() usage - security risk"
          exit 1
        fi
        
        # Check for SQL injection vulnerabilities
        echo "Checking for potential SQL injection..."
        if grep -r -n -E "(execute\(.*\+|query\(.*\+|raw\(.*\+)" --include="*.py" --exclude-dir=tests . 2>/dev/null; then
          echo "⚠️ Found potential SQL injection patterns"
        fi || true
        
        # Check for insecure random usage in trading logic
        echo "Checking for insecure random usage..."
        if grep -r -n "import random" --include="*.py" --exclude-dir=tests services/ router/ 2>/dev/null; then
          echo "⚠️ Found 'random' module usage in trading code - consider using 'secrets' for cryptographic operations"
        fi || true
        
        echo "✅ Trading-specific security checks completed"
        
    - name: Upload analysis reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-analysis-reports
        path: |
          bandit-report.json
          semgrep-report.json
        retention-days: 30

  infrastructure-security:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check GitHub repository security settings
      uses: actions/github-script@v7
      with:
        script: |
          console.log('🔍 Checking repository security settings...');
          
          try {
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            console.log('Security settings:');
            console.log(`  Default branch protection: ${repo.default_branch}`);
            console.log(`  Private repository: ${repo.private}`);
            console.log(`  Delete branch on merge: ${repo.delete_branch_on_merge}`);
            
            // Check branch protection
            try {
              const { data: protection } = await github.rest.repos.getBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: repo.default_branch
              });
              
              console.log('✅ Branch protection is enabled');
              const strict = protection.required_status_checks ? protection.required_status_checks.strict : false;
              console.log(`  Required status checks: ${strict}`);
            } catch (error) {
              console.log('⚠️ Branch protection may not be configured');
            }
          } catch (error) {
            console.error(`Error checking repo settings: ${error.message}`);
          }
          
    - name: Check secrets and environment variables
      run: |
        echo "🔍 Checking for environment variable security..."
        
        # Check for .env files that might be committed
        if find . -name ".env*" -not -path "./venv/*" -not -path "./node_modules/*" | grep -v ".env.example" | head -5; then
          echo "⚠️ Found .env files in repository - ensure they contain no secrets"
        fi
        
        # Check for common insecure patterns in config files
        if find . -name "*.yml" -o -name "*.yaml" -o -name "*.json" | xargs grep -l -E "(password|secret|key|token)" 2>/dev/null | head -5; then
          echo "⚠️ Found potential secrets in configuration files"
        fi
        
        echo "✅ Environment security check completed"

  security-summary:
    runs-on: ubuntu-latest
    needs: [secret-scanning]  # Only depend on secret-scanning for now
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate security summary
      run: |
        echo "🛡️ Security Scan Summary" > security-summary.md
        echo "========================" >> security-summary.md
        echo "" >> security-summary.md
        echo "**Scan Date:** $(date -u)" >> security-summary.md
        echo "**Repository:** ${{ github.repository }}" >> security-summary.md
        echo "**Commit:** ${{ github.sha }}" >> security-summary.md
        echo "" >> security-summary.md
        
        # Check for vulnerability reports
        echo "## Dependency Vulnerabilities" >> security-summary.md
        if [ -d "vulnerability-reports-python" ] || [ -d "vulnerability-reports-npm" ]; then
          echo "📊 Vulnerability reports generated" >> security-summary.md
        else
          echo "✅ No vulnerability reports found" >> security-summary.md
        fi
        echo "" >> security-summary.md
        
        # Check for code analysis reports
        echo "## Code Analysis" >> security-summary.md
        if [ -d "code-analysis-reports" ]; then
          echo "📊 Code analysis reports generated" >> security-summary.md
        else
          echo "✅ No code analysis issues found" >> security-summary.md
        fi
        echo "" >> security-summary.md
        
        echo "## Recommendations" >> security-summary.md
        echo "- Review all identified vulnerabilities" >> security-summary.md
        echo "- Update dependencies with known vulnerabilities" >> security-summary.md
        echo "- Address high-severity code analysis findings" >> security-summary.md
        echo "- Ensure no secrets are committed to the repository" >> security-summary.md
        echo "- Review trading-specific security patterns" >> security-summary.md
        
        cat security-summary.md
        
    - name: Upload security summary
      uses: actions/upload-artifact@v4
      with:
        name: security-summary
        path: security-summary.md
        retention-days: 90