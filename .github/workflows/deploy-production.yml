# Production Deployment Pipeline for Trading Application
name: Deploy to Production

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
      force_deploy:
        description: 'Force deployment (skip some checks)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  deployments: write
  actions: write

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '20.x'

jobs:
  pre-deployment-checks:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.checks.outputs.should_deploy }}
      deployment_tag: ${{ steps.tag.outputs.tag }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Generate deployment tag
      id: tag
      run: |
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG="deploy-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Deployment tag: $TAG"
        
    - name: Pre-deployment validation
      id: checks
      run: |
        echo "🔍 Running pre-deployment checks..."
        
        SHOULD_DEPLOY="true"
        
        # Check if this is a hotfix or regular deployment
        if [[ "${{ github.event.head_commit.message }}" == *"[HOTFIX]"* ]]; then
          echo "🚨 Hotfix deployment detected"
          echo "hotfix=true" >> $GITHUB_OUTPUT
        fi
        
        # Check for breaking changes
        if git log --oneline HEAD~10..HEAD | grep -i "breaking\|major"; then
          echo "⚠️  Breaking changes detected in recent commits"
          if [[ "${{ github.event.inputs.force_deploy }}" != "true" ]]; then
            echo "❌ Deployment blocked due to breaking changes. Use force_deploy to override."
            SHOULD_DEPLOY="false"
          fi
        fi
        
        # Check if required secrets are available
        if [[ -z "${{ secrets.DATABASE_URL }}" ]]; then
          echo "❌ DATABASE_URL secret not configured"
          SHOULD_DEPLOY="false"
        fi
        
        if [[ -z "${{ secrets.RENDER_API_KEY }}" ]]; then
          echo "❌ RENDER_API_KEY secret not configured"
          SHOULD_DEPLOY="false"
        fi
        
        echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
        
    - name: Create deployment
      if: steps.checks.outputs.should_deploy == 'true'
      uses: actions/github-script@v6
      env:
        DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
      with:
        script: |
          const { data: deployment } = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: process.env.DEPLOY_ENV,
            description: 'Automated deployment from GitHub Actions',
            auto_merge: false,
            required_contexts: []
          });
          
          console.log(`Created deployment: ${deployment.id}`);

  railway-deployment:
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.should_deploy == 'true'
    environment:
      name: railway-production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Railway CLI
        run: npm install -g @railway/cli
        
      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying to Railway..."
          
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️ RAILWAY_TOKEN not found, skipping Railway deployment"
            exit 0
          fi
          
          # Deploy and wait for success
          railway up --detach
          
          # Get the URL (assuming specific service name or default)
          # Note: This is a simplification. In real usage, you might need to query the URL explicitly.
          PROJECT_URL=$(railway status --json | jq -r '.[0].domain // empty')
          
          if [ -z "$PROJECT_URL" ]; then
             echo "⚠️ Could not determine Railway URL automatically"
             echo "url=https://railway.app/project" >> $GITHUB_OUTPUT
          else
             echo "✅ Deployed to https://$PROJECT_URL"
             echo "url=https://$PROJECT_URL" >> $GITHUB_OUTPUT
          fi

  backend-deployment:
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.should_deploy == 'true'
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run database migrations (dry-run)
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        echo "🗄️ Testing database migrations..."
        alembic check
        alembic history
        # alembic upgrade head --sql > migration_preview.sql
        # echo "Migration SQL preview generated"
        
    - name: Run security checks
      run: |
        echo "🔒 Running security checks..."
        
        # Check for secrets in code
        if grep -r -n -E "(password|secret|key|token)" --include="*.py" --exclude-dir=venv . | grep -v "#" | grep -v "test"; then
          echo "⚠️  Potential secrets found in code. Please review:"
          grep -r -n -E "(password|secret|key|token)" --include="*.py" --exclude-dir=venv . | grep -v "#" | grep -v "test" || true
        fi
        
        # Install and run safety check
        pip install safety
        safety check --json --output safety-report.json || true
        
    - name: Build and validate configuration
      run: |
        echo "⚙️ Validating production configuration..."
        python -c "
        import os
        os.environ['DATABASE_URL'] = '${{ secrets.DATABASE_URL }}'
        os.environ['JWT_SECRET_KEY'] = '${{ secrets.JWT_SECRET_KEY }}'
        os.environ['UPSTOX_API_KEY'] = '${{ secrets.UPSTOX_API_KEY }}'
        
        from core.production_config import validate_production_config
        if validate_production_config():
            print('✅ Configuration validation passed')
        else:
            print('❌ Configuration validation failed')
            exit(1)
        "
        
    - name: Create deployment package
      run: |
        echo "📦 Creating deployment package..."
        
        # Create deployment info file
        cat > deployment_info.json << EOF
        {
          "version": "${{ needs.pre-deployment-checks.outputs.deployment_tag }}",
          "commit": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "deployed_by": "${{ github.actor }}",
          "workflow_run": "${{ github.run_id }}"
        }
        EOF
        
        echo "Deployment package created"
        
    - name: Deploy to Render
      id: deploy
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        echo "🚀 Deploying to Render..."
        
        # Trigger Render deployment
        DEPLOY_RESPONSE=$(curl -X POST \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "clearCache": false
          }')
        
        echo "Deploy response: $DEPLOY_RESPONSE"
        
        # Extract deploy ID
        DEPLOY_ID=$(echo $DEPLOY_RESPONSE | jq -r '.id')
        echo "Deploy ID: $DEPLOY_ID"
        
        # Wait for deployment to complete
        echo "Waiting for deployment to complete..."
        # Timeout loop after 20 iterations (10 minutes)
        for i in {1..20}; do
          sleep 30
          STATUS_RESPONSE=$(curl -s \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY")
          
          STATUS=$(echo $STATUS_RESPONSE | jq -r '.status')
          echo "Deployment status: $STATUS"
          
          if [[ "$STATUS" == "live" ]]; then
            echo "✅ Deployment successful!"
            SERVICE_URL=$(echo $STATUS_RESPONSE | jq -r '.service.serviceDetails.url')
            echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
            break
          elif [[ "$STATUS" == "build_failed" || "$STATUS" == "update_failed" ]]; then
            echo "❌ Deployment failed!"
            exit 1
          fi
          
          if [[ $i -eq 30 ]]; then
            echo "❌ Deployment timeout!"
            exit 1
          fi
        done

  frontend-deployment:
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, backend-deployment, railway-deployment]
    if: needs.pre-deployment-checks.outputs.should_deploy == 'true'
    
    defaults:
      run:
        working-directory: ui/trading-bot-ui
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ui/trading-bot-ui/package-lock.json
        
    - name: Install dependencies
      run: |
        if [ -f "package-lock.json" ]; then
          npm ci
        else
          npm install
        fi
      
    - name: Build frontend
      env:
        # Connect frontend to the Render backend URL
        REACT_APP_API_URL: ${{ needs.backend-deployment.outputs.url || secrets.REACT_APP_API_URL || 'https://your-backend.onrender.com' }}
        REACT_APP_WS_URL: ${{ secrets.REACT_APP_WS_URL || 'wss://your-backend.onrender.com' }}
        REACT_APP_VERSION: ${{ needs.pre-deployment-checks.outputs.deployment_tag }}
        GENERATE_SOURCEMAP: false
      run: |
        echo "🏗️ Building frontend for production deployment..."
        
        # Ensure API URL is set for production
        if [ -z "$REACT_APP_API_URL" ]; then
           echo "Warning: REACT_APP_API_URL is not set. Using default."
        fi

        echo "API URL: $REACT_APP_API_URL"
        echo "WS URL: $REACT_APP_WS_URL"
        npm run build
        
    - name: Validate build output
      run: |
        echo "📦 Validating build output..."
        if [ ! -d "build" ]; then
          echo "❌ Build directory not found"
          exit 1
        fi
        
        if [ ! -f "build/index.html" ]; then
          echo "❌ index.html not found"
          exit 1
        fi
        
        BUILD_SIZE=$(du -sh build | cut -f1)
        echo "✅ Build size: $BUILD_SIZE"
        ls -la build/
        
    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      with:
        args: deploy --prod --dir=ui/trading-bot-ui/build --message="Production deployment ${{ needs.pre-deployment-checks.outputs.deployment_tag }}"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        
    - name: Verify deployment
      run: |
        echo "🌐 Netlify deployment completed"
        echo "Frontend URL: https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"
        
        # Wait a moment for deployment to propagate
        sleep 10
        
        # Test if the site is accessible
        if curl -f -s "https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app" > /dev/null; then
          echo "✅ Frontend is accessible"
        else
          echo "⚠️ Frontend might still be deploying"
        fi

  post-deployment-tests:
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, backend-deployment, frontend-deployment]
    if: needs.pre-deployment-checks.outputs.should_deploy == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install test dependencies
      run: |
        pip install requests pytest
        
    - name: Health check tests
      env:
        API_URL: ${{ needs.backend-deployment.outputs.url || secrets.BACKEND_URL }}
      run: |
        echo "🏥 Running post-deployment health checks..."
        
        # Test basic health endpoint
        python -c "
        import requests
        import sys
        
        try:
            response = requests.get('$API_URL/health', timeout=30)
            if response.status_code == 200:
                print('✅ Health check passed')
                health_data = response.json()
                print(f'API Status: {health_data.get(\"status\", \"unknown\")}')
            else:
                print(f'❌ Health check failed: {response.status_code}')
                sys.exit(1)
        except Exception as e:
            print(f'❌ Health check error: {e}')
            sys.exit(1)
        "
        
    - name: Database connectivity test
      env:
        API_URL: ${{ needs.backend-deployment.outputs.url || secrets.BACKEND_URL }}
      run: |
        echo "🗄️ Testing database connectivity..."
        
        python -c "
        import requests
        import sys
        
        try:
            response = requests.get('$API_URL/health', timeout=30)
            if response.status_code == 200:
                health_data = response.json()
                if health_data.get('database') == 'healthy':
                    print('✅ Database connectivity verified')
                else:
                    print('❌ Database connectivity failed')
                    sys.exit(1)
            else:
                print('❌ Cannot check database status')
                sys.exit(1)
        except Exception as e:
            print(f'❌ Database check error: {e}')
            sys.exit(1)
        "
        
    - name: WebSocket connectivity test
      env:
        WS_URL: ${{ secrets.WS_URL }}
      run: |
        echo "🔌 Testing WebSocket connectivity..."
        
        # Install websocket client
        pip install websocket-client
        
        python -c "
        import websocket
        import json
        import threading
        import time
        import sys
        
        def on_message(ws, message):
            print('✅ WebSocket message received')
            ws.close()
        
        def on_error(ws, error):
            print(f'❌ WebSocket error: {error}')
        
        def on_close(ws, close_status_code, close_msg):
            print('WebSocket connection closed')
        
        def on_open(ws):
            print('✅ WebSocket connected')
            # Send test message
            ws.send(json.dumps({'type': 'ping'}))
        
        try:
            ws = websocket.WebSocketApp('$WS_URL',
                                      on_open=on_open,
                                      on_message=on_message,
                                      on_error=on_error,
                                      on_close=on_close)
            
            # Run for 10 seconds max
            wst = threading.Thread(target=ws.run_forever)
            wst.daemon = True
            wst.start()
            
            time.sleep(10)
            ws.close()
            print('WebSocket test completed')
        except Exception as e:
            print(f'❌ WebSocket test failed: {e}')
            sys.exit(1)
        "

  deployment-notification:
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, backend-deployment, frontend-deployment, post-deployment-tests]
    if: always()
    
    steps:
    - name: Notify deployment status
      uses: actions/github-script@v6
      with:
        script: |
          const success = '${{ needs.post-deployment-tests.result }}' === 'success';
          const status = success ? 'success' : 'failure';
          const description = success ? 'Deployment completed successfully' : 'Deployment failed';
          
          // Update deployment status
          try {
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              per_page: 1
            });
            
            if (deployments.data.length > 0) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployments.data[0].id,
                state: status,
                description: description,
                target_url: '${{ needs.backend-deployment.outputs.url }}'
              });
            }
          } catch (error) {
            console.log('Could not update deployment status:', error);
          }
          
          // Create release if successful
          if (success && context.ref.startsWith('refs/tags/')) {
            const tagName = context.ref.replace('refs/tags/', '');
            
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: `Release ${tagName}`,
                body: |
                  ## Production Deployment ${tagName}
                  
                  **Deployed at:** ${new Date().toISOString()}
                  **Commit:** ${context.sha}
                  **Actor:** ${{ github.actor }}
                  
                  ### Health Checks
                  - API Health Check: Passed
                  - Database Connectivity: Passed  
                  - WebSocket Connectivity: Passed
                  
                  ### Links
                  - [Backend API (Render)](${{ needs.backend-deployment.outputs.url }})
                  - [Frontend App (Netlify)](https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app)
                  - [Monitoring Dashboard](${{ secrets.GRAFANA_URL }})
                  
                  ### Architecture
                  - **Backend**: FastAPI on Render
                  - **Frontend**: React SPA on Netlify
                  - **Database**: PostgreSQL
                  - **Monitoring**: Prometheus + Grafana,
                draft: false,
                prerelease: false
              });
              
              console.log(`Created release: ${tagName}`);
            } catch (error) {
              console.log('Could not create release:', error);
            }
          }
          
    - name: Slack notification
      if: always()
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      run: |
        if [[ -n "$SLACK_WEBHOOK" ]]; then
          STATUS="${{ needs.post-deployment-tests.result }}"
          if [[ "$STATUS" == "success" ]]; then
            COLOR="good"
            EMOJI=":rocket:"
            MESSAGE="Production deployment completed successfully"
          else
            COLOR="danger"
            EMOJI=":x:"
            MESSAGE="Production deployment failed"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$EMOJI Trading Bot Deployment\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Environment\", \"value\": \"${{ github.event.inputs.environment || 'production' }}\", \"short\": true},
                  {\"title\": \"Version\", \"value\": \"${{ needs.pre-deployment-checks.outputs.deployment_tag }}\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true}
                ]
              }]
            }" \
            $SLACK_WEBHOOK
        fi